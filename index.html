  .btn {

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }

let cards = rawCards.map((c,i)=>({...c, id:i, cat:categories[i], mastered:false, review:false}));
let order = cards.map((_,i)=>i);
let idx = 0;
let flipped = false;

function render() {
  const card = cards[order[idx]];
  document.getElementById('cardQ').textContent = card.q;
  document.getElementById('cardA').textContent = card.a;
  document.getElementById('cardNum').textContent = '#' + String(idx+1).padStart(2,'0');
  document.getElementById('cardNumBack').textContent = '#' + String(idx+1).padStart(2,'0');
  document.getElementById('cardCat').textContent = card.cat;
  document.getElementById('progressLabel').textContent = (idx+1) + ' / ' + order.length;
  document.getElementById('progressPct').textContent = Math.round((idx+1)/order.length*100) + '%';
  document.getElementById('progressFill').style.width = ((idx+1)/order.length*100) + '%';
  document.getElementById('statMastered').textContent = cards.filter(c=>c.mastered).length;
  document.getElementById('statReview').textContent = cards.filter(c=>c.review).length;
  document.getElementById('statRemaining').textContent = cards.filter(c=>!c.mastered).length;
  const catEl = document.getElementById('cardCat');
  if(card.mastered) { catEl.textContent = card.cat + ' '; catEl.innerHTML += '<span class="badge badge-mastered">HAFA</span>'; }
  else if(card.review) { catEl.textContent = card.cat + ' '; catEl.innerHTML += '<span class="badge badge-review">REVIEW</span>'; }
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('is-flipped', flipped);
}

function nextCard() {
  if(idx < order.length-1) { idx++; flipped=false; document.getElementById('card').classList.remove('is-flipped'); render(); }
  else { showOverlay(); }
}

function prevCard() {
  if(idx > 0) { idx--; flipped=false; document.getElementById('card').classList.remove('is-flipped'); render(); }
}

function markMastered() {
  cards[order[idx]].mastered = true; cards[order[idx]].review = false; render();
  const btn = document.querySelector('.btn-success'); btn.style.transform='scale(1.1)'; setTimeout(()=>btn.style.transform='',150);
}

function markReview() {
  cards[order[idx]].review = true; cards[order[idx]].mastered = false; render();
  const btn = document.querySelector('.btn-danger'); btn.style.transform='scale(1.1)'; setTimeout(()=>btn.style.transform='',150);
}

function shuffleCards() {
  for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
  idx=0; flipped=false; document.getElementById('card').classList.remove('is-flipped'); render();
}

function showOverlay() {
  const mastered = cards.filter(c=>c.mastered).length;
  const review = cards.filter(c=>c.review).length;
  const msg = mastered === cards.length ? 'Semua kartu sudah kamu hafal. Kerja bagus!' : `Hafal: <b>${mastered}</b> | Perlu review: <b>${review}</b>. Kartu yang belum ditandai bisa kamu ulangi.`;
  document.getElementById('overlayMsg').innerHTML = msg;
  document.getElementById('overlay').classList.add('active');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('active'); }

function resetSession() {
  cards.forEach(c=>{c.mastered=false; c.review=false;});
  order = cards.map((_,i)=>i); idx=0; flipped=false;
  document.getElementById('card').classList.remove('is-flipped');
  closeOverlay(); render();
}

document.addEventListener('keydown', e=>{
  if(e.key===' '||e.key==='Enter'){ e.preventDefault(); flipCard(); }
  else if(e.key==='ArrowRight') nextCard();
  else if(e.key==='ArrowLeft') prevCard();
  else if(e.key==='1'||e.key==='m') markMastered();
  else if(e.key==='2'||e.key==='r') markReview();
});

render();
